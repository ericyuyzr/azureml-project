name: Azure ML CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  ml-ci:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure ML CLI Extension
        run: az extension add -n ml -y

      - name: Configure Azure ML Defaults
        run: |
          az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          az configure --defaults group="learn-networking-rg" workspace="azml2"

      - name: Ensure Compute Cluster Exists
        run: az ml compute create --file azureml/create-compute.yml

      - name: Submit Training Job to Azure ML
        id: submit_job
        run: |
          echo "Submitting training job to Azure ML control plane..."
          # 1. Create the job as pure JSON metadata to isolate the unique name cleanly
          JOB_OUTPUT=$(az ml job create --file azureml/train-job.yml --output json)
          JOB_NAME=$(echo $JOB_OUTPUT | jq -r '.name')
          
          # 2. Save the name into the GitHub environment variable map for the next step
          echo "JOB_NAME=$JOB_NAME" >> $GITHUB_ENV
          echo "Successfully created job: $JOB_NAME"
          
          # 3. Stream the live training logs straight to your pipeline window
          echo "Streaming live cluster training logs..."
          az ml job stream --name $JOB_NAME

      - name: Register Model on Merge to Main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          az ml model create --name "my_production_model" \
            --path "azureml://jobs/${{ env.JOB_NAME }}/outputs/artifacts/paths/outputs/" \
            --type "custom_model"