name: Azure ML CD Pipeline

on:
  workflow_run:
    workflows:
      - Azure ML CI Pipeline
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    steps:

      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' 

      - name: Install Azure ML SDK
        run: |
          python -m pip install --upgrade pip
          pip install azure-ai-ml azure-identity

      - name: Deploy Schedule
        env:
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          RESOURCE_GROUP: learn-networking-rg
          WORKSPACE_NAME: eric-mlops-aml-dv4h2dbsbpuf6
        run: |
          python azureml/deploy_schedule.py